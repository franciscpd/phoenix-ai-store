name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test

jobs:
  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: '1.15.8'
            otp: '26.2'
          - elixir: '1.15.8'
            otp: '27.2'
          - elixir: '1.17.3'
            otp: '26.2'
          - elixir: '1.17.3'
            otp: '27.2'
    services:
      postgres:
        image: postgres:16
        ports: ['5432:5432']
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: phoenix_ai_store_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/phoenix_ai_store_test
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ matrix.elixir }}-${{ matrix.otp }}-
      - run: mix deps.get
      - run: mix test

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17.3'
          otp-version: '27.2'
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-1.17.3-27.2-${{ hashFiles('mix.lock') }}
          restore-keys: mix-1.17.3-27.2-
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix credo --strict
      - run: mix format --check-formatted

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        id: beam
        with:
          elixir-version: '1.17.3'
          otp-version: '27.2'
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-1.17.3-27.2-${{ hashFiles('mix.lock') }}
          restore-keys: mix-1.17.3-27.2-
      - uses: actions/cache@v4
        with:
          path: priv/plts
          key: plt-${{ steps.beam.outputs.elixir-version }}-${{ steps.beam.outputs.otp-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: plt-${{ steps.beam.outputs.elixir-version }}-${{ steps.beam.outputs.otp-version }}-
      - run: mix deps.get
      - run: mix dialyzer

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17.3'
          otp-version: '27.2'
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-1.17.3-27.2-${{ hashFiles('mix.lock') }}
          restore-keys: mix-1.17.3-27.2-
      - run: mix deps.get
      - run: mix docs
